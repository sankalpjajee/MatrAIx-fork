<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Try out your chatbot, survey, or website against realistic simulated users and see how well it performs — before real people do."
    />
    <title>MatrAIx — simulate users across your applications</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Set the theme class before paint to avoid a light/dark flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("personaeval-theme");
          if (t !== "dark") {
            document.documentElement.classList.add("light");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- PersonaEval faces: Inter (UI) · Space Grotesk (display) · JetBrains Mono (data + HUD). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols Outlined (icon set; lucide migration is a follow-up). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
