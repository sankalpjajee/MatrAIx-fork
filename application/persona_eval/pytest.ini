[pytest]
# Scope collection to this app's own test suites. The vendored RecAI engine
# under recai/ ships its own (third-party) training/eval test scripts that
# require heavy optional deps (fastchat, Levenshtein, ...) not installed in the
# harness environment; collecting them breaks a bare `pytest -q`. Pinning
# testpaths keeps `pytest -q` green and focused on the harness code we own.
testpaths =
    backend/tests
norecursedirs = .venv .git frontend node_modules
