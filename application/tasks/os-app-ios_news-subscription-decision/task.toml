version = "1.0"
artifacts = [ "/tmp/os-app-ios-news-subscription-decision",]

[task]
name = "application/os-app-ios-news-subscription-decision"

[metadata]
difficulty = "medium"
type = "os-app"
os = "ios"
domain = "software"
tags = [
  "apple news",
  "News+",
  "subscription conversion",
  "Get Started",
  "features and pricing",
  "offer page browse",
]


[ios]
device_type = "iPhone-17"
runtime = "iOS-26-4"

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 1800.0

[environment]
definition = "application/shared-os-app-mac-ios"
cpus = 4
memory_mb = 4096
storage_mb = 40960
gpus = 0

[environment.healthcheck]
command = "mkdir -p /tmp/os-app-ios-news-subscription-decision"
timeout_sec = 30.0
retries = 3
