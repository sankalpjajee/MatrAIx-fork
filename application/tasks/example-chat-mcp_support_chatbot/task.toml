version = "1.0"
artifacts = [ "/app/output",]

[task]
name = "application/mcp-support-chatbot"

[metadata]
difficulty = "easy"
type = "chatbot"
domain = "commerce-retail"
tags = [ "acme support", "missing delivery", "order 4521", "multi turn support", "delivery investigation",]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/chatbot-mcp-sidecar_acme-support"
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
[[environment.mcp_servers]]
name = "acme-support"
transport = "streamable-http"
url = "http://support-bot:8000/mcp"
args = []
