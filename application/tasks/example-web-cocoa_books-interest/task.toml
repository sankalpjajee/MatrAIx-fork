version = "1.0"
artifacts = [ "/app/output",]

[task]
name = "personabench/application-web-cocoa-books-interest"

[metadata]
difficulty = "medium"
type = "web"
domain = "commerce-retail"
tags = [ "books toscrape", "fiction catalog", "book purchase intent", "online bookshop",]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1200.0
network_mode = "public"

[environment]
definition = "application/example-web-cocoa_books-interest"
build_timeout_sec = 1800.0
cpus = 2
memory_mb = 4096
storage_mb = 20480
gpus = 0
network_mode = "public"

[environment.healthcheck]
command = "curl -sf http://127.0.0.1:8080/v1/ping"
interval_sec = 10.0
timeout_sec = 15.0
start_period_sec = 180.0
start_interval_sec = 5.0
retries = 6
