# Harbor's default compose uses `sleep infinity`, which prevents AIO Sandbox
# from starting. CocoaAgent needs the sandbox API on localhost:8080.
services:
  main:
    platform: linux/amd64
    entrypoint: ["/opt/gem/run.sh"]
    command: []
    shm_size: "2gb"
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8080/v1/ping >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 180s
