schemaVersion: "1.0"
id: tus_cps_v1
title: "CPS Tobacco Use Supplement Survey"
description: "The Tobacco Use Supplement to the Current Population Survey (TUS-CPS) is sponsored by the National Cancer Institute (NCI) and fielded by the U.S. Census Bureau. It is a key source "
questions:
  - id: q0
    prompt: "Have you smoked at least 100 cigarettes in your entire life? (100 cigarettes is approximately 5 packs.)"
    type: single_choice
    construct: have_smoked_least_100_cigarettes
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q1
    prompt: "How old were you when you first started smoking cigarettes FAIRLY REGULARLY (that is, on a routine basis, as opposed to when you first tried a cigarette)? Enter an age, or enter 0 if you never smoked regularly."
    type: free_text
    construct: old_were_when_first_started
    required: true
  - id: q2
    prompt: "Do you now smoke cigarettes every day, some days, or not at all?"
    type: single_choice
    construct: now_smoke_cigarettes_every_day
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "Some days"
      - id: "c"
        label: "Not at all"
  - id: q3
    prompt: "On average, about how many cigarettes do you now smoke each day? (One pack usually equals 20 cigarettes.) Please enter a number."
    type: free_text
    construct: average_many_cigarettes_now_smoke
    required: true
  - id: q4
    prompt: "Do you usually smoke menthol or non-menthol cigarettes?"
    type: single_choice
    construct: usually_smoke_menthol_non_menthol
    required: true
    options:
      - id: "a"
        label: "Menthol"
      - id: "b"
        label: "Non-menthol"
      - id: "c"
        label: "No usual type"
  - id: q5
    prompt: "How soon after you wake up do you typically smoke your first cigarette of the day? Please give your best answer in minutes or hours."
    type: free_text
    construct: soon_after_wake_up_typically
    required: true
  - id: q6
    prompt: "Would you say you smoke your first cigarette of the day within the first 30 minutes?"
    type: single_choice
    construct: would_say_smoke_first_cigarette
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
      - id: "c"
        label: "Varies"
  - id: q7
    prompt: "Do you usually buy your own cigarettes?"
    type: single_choice
    construct: usually_buy_own_cigarettes
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q8
    prompt: "Do you usually buy your cigarettes by the pack or by the carton? (A carton has 10 packs.)"
    type: single_choice
    construct: usually_buy_cigarettes_by_pack
    required: true
    options:
      - id: "a"
        label: "Pack"
      - id: "b"
        label: "Carton"
      - id: "c"
        label: "Buy both packs and cartons"
  - id: q9
    prompt: "In the LAST 2 months, have you bought any single or individual cigarettes?"
    type: single_choice
    construct: last_2_months_have_bought
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q10
    prompt: "In the LAST 2 months, have you bought loose tobacco to roll your own cigarettes?"
    type: single_choice
    construct: last_2_months_have_bought
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q11
    prompt: "For how long have you smoked EVERY DAY?"
    type: single_choice
    construct: long_have_smoked_every_day
    required: true
    options:
      - id: "a"
        label: "All or nearly all the years you have smoked"
      - id: "b"
        label: "Most of the years you have smoked"
      - id: "c"
        label: "Half of the years you have smoked"
      - id: "d"
        label: "Less than half the years you have smoked"
      - id: "e"
        label: "Less than one year"
  - id: q12
    prompt: "Have you EVER smoked MENTHOL cigarettes for 6 months or more?"
    type: single_choice
    construct: have_ever_smoked_menthol_cigarettes
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q13
    prompt: "Around this time 12 MONTHS AGO, were you smoking cigarettes every day, some days, or not at all?"
    type: single_choice
    construct: around_this_time_12_months
    required: true
    options:
      - id: "a"
        label: "Every day"
      - id: "b"
        label: "Some days"
      - id: "c"
        label: "Not at all"
  - id: q14
    prompt: "During the PAST 12 MONTHS, have you TRIED to QUIT smoking COMPLETELY?"
    type: single_choice
    construct: during_past_12_months_have
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q15
    prompt: "Have you EVER TRIED to QUIT smoking COMPLETELY?"
    type: single_choice
    construct: have_ever_tried_quit_smoking
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q16
    prompt: "During the PAST 12 MONTHS, have you stopped smoking for ONE DAY or longer BECAUSE YOU WERE TRYING TO QUIT SMOKING?"
    type: single_choice
    construct: during_past_12_months_have
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q17
    prompt: "How many TIMES during the past 12 months have you stopped smoking for one day or longer because you were trying to quit smoking?"
    type: single_choice
    construct: many_times_during_past_12
    required: true
    options:
      - id: "a"
        label: "Once (1 time)"
      - id: "b"
        label: "2-3 times"
      - id: "c"
        label: "4 or more times"
  - id: q18
    prompt: "During the PAST 12 MONTHS, have you made a serious attempt to stop smoking because you were TRYING to quit — even if you stopped for less than a day?"
    type: single_choice
    construct: during_past_12_months_have
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q19
