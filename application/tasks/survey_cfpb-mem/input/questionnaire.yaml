schemaVersion: "1.0"
id: cfpb_mem_v1
title: "CFPB Making Ends Meet Survey"
description: "The CFPB's Making Ends Meet survey tracks the financial lives of U.S. consumers who have a credit record — how they are faring financially, their ability to pay bills and cover exp"
questions:
  - id: q0
    prompt: "How well does this statement describe you or your situation? \"I know how to make complex financial decisions.\""
    type: single_choice
    construct: well_does_this_statement_describe
    required: true
    options:
      - id: "a"
        label: "Completely"
      - id: "b"
        label: "Very well"
      - id: "c"
        label: "Somewhat"
      - id: "d"
        label: "Very little"
      - id: "e"
        label: "Not at all"
  - id: q1
    prompt: "How well does this statement describe you or your situation? \"I am comfortable using English to perform financial transactions.\""
    type: single_choice
    construct: well_does_this_statement_describe
    required: true
    options:
      - id: "a"
        label: "Completely"
      - id: "b"
        label: "Very well"
      - id: "c"
        label: "Somewhat"
      - id: "d"
        label: "Very little"
      - id: "e"
        label: "Not at all"
  - id: q2
