        label: "Yes, I influenced the purchase of a substantial addition to the tech stack"
      - id: "b"
        label: "Yes, I influenced the purchase of a tool that more than five colleagues use but it is not a substantial addition to the tech stack"
      - id: "c"
        label: "Yes, I endorsed a tool that was open-source and is currently used by more than just myself but no purchase was made"
      - id: "d"
        label: "Yes, I endorsed a tool that was ultimately not purchased or used at my organization"
      - id: "e"
        label: "No"
