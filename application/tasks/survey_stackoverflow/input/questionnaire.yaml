schemaVersion: "1.0"
id: stackoverflow_v1
title: "Stack Overflow Developer Survey"
description: "The Stack Overflow Annual Developer Survey is the largest survey of people who code worldwide, covering developers' demographics, education, and employment; the technologies they u"
questions:
  - id: q0
    prompt: "Are you someone who writes code? Please select one of the following options that best describes you today."
    type: single_choice
    construct: someone_who_writes_code_please
    required: true
    options:
      - id: "a"
        label: "I am a developer by profession"
      - id: "b"
        label: "I am not primarily a developer, but I write code sometimes as part of my work/studies"
      - id: "c"
        label: "I used to be a developer by profession, but no longer am"
      - id: "d"
        label: "I am learning to code"
      - id: "e"
        label: "I code primarily as a hobby"
      - id: "f"
        label: "I work with developers or my work supports developers but am not a developer by profession"
      - id: "g"
        label: "None of these"
  - id: q1
    prompt: "What is your age?"
    type: single_choice
    construct: age
    required: true
    options:
      - id: "a"
        label: "Under 18 years old"
      - id: "b"
        label: "18-24 years old"
      - id: "c"
        label: "25-34 years old"
      - id: "d"
        label: "35-44 years old"
      - id: "e"
        label: "45-54 years old"
      - id: "f"
        label: "55-64 years old"
      - id: "g"
        label: "65 years or older"
      - id: "h"
        label: "Prefer not to say"
  - id: q2
    prompt: "Which of the following best describes the highest level of formal education that you’ve completed?"
    type: single_choice
    construct: following_best_describes_highest_level
    required: true
    options:
      - id: "a"
        label: "Primary/elementary school"
      - id: "b"
        label: "Secondary school (e.g. American high school, German Realschule or Gymnasium, etc.)"
      - id: "c"
        label: "Some college/university study without earning a degree"
      - id: "d"
        label: "Associate degree (A.A., A.S., etc.)"
      - id: "e"
        label: "Bachelor’s degree (B.A., B.S., B.Eng., etc.)"
      - id: "f"
        label: "Master’s degree (M.A., M.S., M.Eng., MBA, etc.)"
      - id: "g"
        label: "Professional degree (JD, MD, Ph.D, Ed.D, etc.)"
      - id: "h"
        label: "Other (please specify)"
  - id: q3
    prompt: "Which of the following best describes your current employment status?"
    type: single_choice
    construct: following_best_describes_current_employm
    required: true
    options:
      - id: "a"
        label: "Employed"
      - id: "b"
        label: "Independent contractor, freelancer, or self-employed"
      - id: "c"
        label: "Not employed"
      - id: "d"
        label: "Student"
      - id: "e"
        label: "Retired"
      - id: "f"
        label: "I prefer not to say"
  - id: q4
    prompt: "Which of the following additional activities are you currently engaged in? (Select all that apply)"
    type: multi_choice
    construct: following_additional_activities_currentl
    required: true
    options:
      - id: "a"
        label: "Attending school (full-time)"
      - id: "b"
        label: "Attending school (part-time)"
      - id: "c"
        label: "Engaged in paid work (less than 10 hours per week)"
      - id: "d"
        label: "Engaged in paid work (10-19 hours per week)"
      - id: "e"
        label: "Engaged in paid work (20-29 hours per week)"
      - id: "f"
        label: "Transitioning to retirement (gradually reducing work hours)"
      - id: "g"
        label: "Volunteering (regularly)"
      - id: "h"
        label: "Caring for dependents (children, elderly, etc.)"
      - id: "i"
        label: "None of the above"
  - id: q5
    prompt: "How many years of professional work experience do you have? Please round to the nearest whole number, excluding any decimal points. If your answer is '0', please leave blank."
    type: free_text
    construct: many_years_professional_work_experience
    required: true
  - id: q6
    prompt: "Did you begin learning to code or learn a new coding skill/programming language in the last year?"
    type: single_choice
    construct: did_begin_learning_code_learn
    required: true
    options:
      - id: "a"
        label: "Yes, I am new to coding or currently a student"
      - id: "b"
        label: "Yes, I am not new to coding but am learning new coding techniques or programming language"
      - id: "c"
        label: "No, I am not new to coding and did not learn new coding techniques or programming languages"
  - id: q7
    prompt: "How did you learn to code in the past year? (Select all that apply)"
    type: multi_choice
    construct: did_learn_code_past_year
    required: true
    options:
      - id: "a"
        label: "Technical documentation (is generated for/by the tool or system)"
      - id: "b"
        label: "Games or coding challenges"
      - id: "c"
        label: "Colleague or on-the-job training"
      - id: "d"
        label: "Videos (not associated with specific online course or certification)"
      - id: "e"
        label: "Online Courses or Certification (includes all media types)"
      - id: "f"
        label: "Books / Physical media"
      - id: "g"
        label: "Stack Overflow or Stack Exchange"
      - id: "h"
        label: "AI CodeGen tools or AI-enabled apps"
      - id: "i"
        label: "Blogs or podcasts"
      - id: "j"
        label: "School (i.e., University, College, etc)"
      - id: "k"
        label: "Other online resources (e.g. standard search, forum, online community)"
      - id: "l"
        label: "Coding Bootcamp"
      - id: "m"
        label: "Other (please specify)"
  - id: q8
    prompt: "Did you spend time in the last year learning AI programming or AI-enabled tooling on your own or at work?"
    type: single_choice
    construct: did_spend_time_last_year
    required: true
    options:
      - id: "a"
        label: "Yes, I learned how to use AI-enabled tools required for my job or to benefit my career"
      - id: "b"
        label: "Yes, I learned how to use AI-enabled tools for my personal curiosity and/or hobbies"
      - id: "c"
        label: "No, I learned something that was not related to AI or AI enablement as required for my job or to benefit my career"
      - id: "d"
        label: "No, I learned something that was not related to AI or AI enablement for my personal curiosity and/or hobbies"
      - id: "e"
        label: "No, I didn't spend time learning in the past year"
  - id: q9
    prompt: "How did you learn to code for AI in the past year? (Select all that apply)"
    type: multi_choice
    construct: did_learn_code_ai_past
    required: true
    options:
      - id: "a"
        label: "Games or coding challenges"
      - id: "b"
        label: "Blogs or podcasts"
      - id: "c"
        label: "School (i.e., University, College, etc)"
      - id: "d"
        label: "Stack Overflow or Stack Exchange"
      - id: "e"
        label: "Coding Bootcamp"
      - id: "f"
        label: "Online Courses or Certification (includes all media types)"
      - id: "g"
        label: "Colleague or on-the-job training"
      - id: "h"
        label: "AI CodeGen tools or AI-enabled apps"
      - id: "i"
        label: "Books / Physical media"
      - id: "j"
        label: "Technical documentation (is generated for/by the tool or system)"
      - id: "k"
        label: "Videos (not associated with specific online course or certification)"
      - id: "l"
        label: "Other online resources (e.g. standard search, forum, online community)"
      - id: "m"
        label: "Other (please specify)"
  - id: q10
    prompt: "Including any education, how many years have you been coding in total? Please round to the nearest whole number, excluding any decimal points."
    type: free_text
    construct: including_any_education_many_years
    required: true
