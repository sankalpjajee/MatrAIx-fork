version = "1.0"
artifacts = ["/app/output"]

[task]
name = "application/multi-agent-medical-assistant"

[metadata]
difficulty = "medium"
type = "chatbot"
domain = "medical-consultation"
tags = [
  "medical assistant",
  "health information",
  "triage guidance",
  "multi turn chat",
]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/chatbot-api-sidecar_multi-agent-medical-assistant"
build_timeout_sec = 900.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
