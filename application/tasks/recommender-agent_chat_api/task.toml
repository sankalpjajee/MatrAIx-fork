version = "1.0"
artifacts = ["/app/output"]

[task]
name = "personabench/application-recommender-agent-chat-api"

[metadata]
difficulty = "medium"
type = "chat"
domain = "commerce-retail"
tags = [
  "recommender agent",
  "conversational recommendation",
  "product discovery",
  "multi turn chat",
  "recommendation grounding",
]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 900.0

[environment]
definition = "application/recommender-agent_chat_api"
build_timeout_sec = 900.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
