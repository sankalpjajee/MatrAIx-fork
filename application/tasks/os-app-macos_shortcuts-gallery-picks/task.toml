version = "1.0"
artifacts = [ "/tmp/os-app-macos-shortcuts-gallery-picks",]

[task]
name = "application/os-app-macos-shortcuts-gallery-picks"

[metadata]
difficulty = "medium"
type = "os-app"
os = "macos"
domain = "software"
tags = [
  "shortcuts",
  "gallery browse",
  "automation preference",
  "multi-pick decision",
  "desktop productivity",
]

[verifier]
timeout_sec = 300.0

[verifier.env]
HARBOR_VERIFIER_DIR = "/tmp/harbor/logs/verifier"

[agent]
timeout_sec = 1800.0

[environment]
definition = "application/shared-os-app-mac-ios"
cpus = 4
memory_mb = 4096
storage_mb = 40960
gpus = 0

[environment.healthcheck]
command = "mkdir -p /tmp/os-app-macos-shortcuts-gallery-picks"
timeout_sec = 30.0
retries = 3
