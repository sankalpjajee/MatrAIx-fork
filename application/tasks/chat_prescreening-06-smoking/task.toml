version = "1.0"
artifacts = ["/app/output"]

[task]
name = "application/chat-prescreening-06-smoking"

[metadata]
difficulty = "medium"
type = "chatbot"
domain = "healthcare"
tags = [
  "smoking cessation",
  "cigarettes per day floor",
  "recent MI safety window",
  "eligibility screening",
]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/chatbot-api-sidecar_prescreening"
build_timeout_sec = 900.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
