schemaVersion: "1.0"
id: household_pulse_v1
title: "Census Household Pulse Survey"
description: "The Census Bureau's Household Pulse Survey is a near-real-time survey measuring how U.S. households are experiencing social and economic conditions — employment and income, spendin"
questions:
  - id: q0
    prompt: "What year were you born? Please enter a number."
    type: free_text
    construct: year_were_born_please_enter
    required: true
  - id: q1
    prompt: "Are you of Hispanic, Latino, or Spanish origin?"
    type: single_choice
    construct: hispanic_latino_spanish_origin
    required: true
    options:
      - id: "a"
        label: "No, not of Hispanic, Latino, or Spanish origin"
      - id: "b"
        label: "Yes, Mexican, Mexican American, Chicano"
      - id: "c"
        label: "Yes, Puerto Rican"
      - id: "d"
        label: "Yes, Cuban"
      - id: "e"
        label: "Yes, another Hispanic, Latino, or Spanish origin"
  - id: q2
    prompt: "What is your race? (Select all that apply)"
    type: multi_choice
    construct: race_select_all_that_apply
    required: true
    options:
      - id: "a"
        label: "White"
      - id: "b"
        label: "Black or African American"
      - id: "c"
        label: "American Indian or Alaska Native"
      - id: "d"
        label: "Asian Indian"
      - id: "e"
        label: "Chinese"
      - id: "f"
        label: "Filipino"
      - id: "g"
        label: "Japanese"
      - id: "h"
        label: "Korean"
      - id: "i"
        label: "Vietnamese"
      - id: "j"
        label: "Other Asian"
      - id: "k"
        label: "Native Hawaiian"
      - id: "l"
        label: "Chamorro"
      - id: "m"
        label: "Samoan"
      - id: "n"
        label: "Other Pacific Islander"
  - id: q3
    prompt: "What is the highest degree or level of school you have completed?"
    type: single_choice
    construct: highest_degree_level_school_have
    required: true
    options:
      - id: "a"
        label: "Less than high school"
      - id: "b"
        label: "Some high school"
      - id: "c"
        label: "High school graduate or equivalent (for example GED)"
      - id: "d"
        label: "Some college, but degree not received or is in progress"
      - id: "e"
        label: "Associate's degree (for example AA, AS)"
      - id: "f"
        label: "Bachelor's degree (for example BA, BS, AB)"
      - id: "g"
        label: "Graduate degree (for example master's, professional, doctorate)"
  - id: q4
    prompt: "What is your marital status?"
    type: single_choice
    construct: marital_status
    required: true
    options:
      - id: "a"
        label: "Now married"
      - id: "b"
        label: "Widowed"
      - id: "c"
        label: "Divorced"
      - id: "d"
        label: "Separated"
      - id: "e"
        label: "Never married"
  - id: q5
    prompt: "What sex were you assigned at birth, on your original birth certificate?"
    type: single_choice
    construct: sex_were_assigned_birth_original
    required: true
    options:
      - id: "a"
        label: "Male"
      - id: "b"
        label: "Female"
  - id: q6
    prompt: "Do you currently describe yourself as male, female or transgender?"
    type: single_choice
    construct: currently_describe_yourself_as_male
    required: true
    options:
      - id: "a"
        label: "Male"
      - id: "b"
        label: "Female"
      - id: "c"
        label: "Transgender"
      - id: "d"
        label: "None of these"
  - id: q7
    prompt: "Which of the following best represents how you think of yourself?"
    type: single_choice
    construct: following_best_represents_think_yourself
    required: true
    options:
      - id: "a"
        label: "Gay or lesbian"
      - id: "b"
        label: "Straight, that is not gay or lesbian"
      - id: "c"
        label: "Bisexual"
      - id: "d"
        label: "Something else"
      - id: "e"
        label: "I don't know"
  - id: q8
    prompt: "How many total people – adults and children – currently live in your household, including yourself? Please enter a number."
    type: free_text
    construct: many_total_people_adults_children
    required: true
  - id: q9
    prompt: "How many people under 18 years-old currently live in your household? Please enter a number."
    type: free_text
    construct: many_people_under_18_years
    required: true
  - id: q10
    prompt: "In your household, are there… (Select all that apply)"
    type: multi_choice
    construct: household_there_select_all_that
    required: true
    options:
      - id: "a"
        label: "Children under 5 years old"
      - id: "b"
        label: "Children 5 through 11 years old"
      - id: "c"
        label: "Children 12 through 17 years old"
  - id: q11
    prompt: "Are there any babies or infants under the age of 12 months (one year) old in your household?"
    type: single_choice
    construct: there_any_babies_infants_under
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q12
    prompt: "How many months old is the baby or infant in your household? If there is more than one, please report the age of the youngest."
    type: single_choice
    construct: many_months_old_baby_infant
    required: true
    options:
      - id: "a"
        label: "Under 6 months"
      - id: "b"
        label: "Between 6 months and 9 months"
      - id: "c"
        label: "Between 9 months and 12 months"
  - id: q13
    prompt: "How is the baby in your household fed (in addition to any solid foods the baby may be consuming)? If there is more than one baby, please report on the youngest."
    type: single_choice
    construct: baby_household_fed_addition_any
    required: true
    options:
      - id: "a"
        label: "Breastfeeding (or pumped breastmilk) only"
      - id: "b"
        label: "Sometimes breastfeeding (or pumped breastmilk) and sometimes infant formula"
      - id: "c"
        label: "Infant formula only"
      - id: "d"
        label: "Baby isn't fed breastmilk OR infant formula"
  - id: q14
    prompt: "In the last month, did you have difficulty getting infant formula?"
    type: single_choice
    construct: last_month_did_have_difficulty
    required: true
    options:
      - id: "a"
        label: "Yes, in the last 7 days"
      - id: "b"
        label: "Yes, more than 7 days ago but within the last month"
      - id: "c"
        label: "No, did not have trouble getting infant formula in the last month"
  - id: q15
    prompt: "During the school year that began in the Summer / Fall of 2023, how many children in this household were enrolled in Kindergarten through 12th grade or grade equivalent? Give whole numbers for the number enrolled in a public school, the number enrolled in a private school, and the number homeschooled (not enrolled in public or private school), or state \"None\"."
    type: free_text
    construct: during_school_year_that_began
    required: true
  - id: q16
    prompt: "Are you or your spouse currently serving in the U.S. Armed Forces (Active Duty, Reserve, or National Guard)? Reserve and Guard members/spouses who are full-time active duty or currently \"activated\" should select the \"Reserve or National Guard\" response(s). (Select all that apply)"
    type: multi_choice
    construct: spouse_currently_serving_u_s
    required: true
    options:
      - id: "a"
        label: "No"
      - id: "b"
        label: "Yes, I'm serving on active duty"
      - id: "c"
        label: "Yes, I'm serving in the Reserve or National Guard"
      - id: "d"
        label: "Yes, my spouse is serving on active duty"
      - id: "e"
        label: "Yes, my spouse is serving in the Reserve or National Guard"
  - id: q17
    prompt: "Have you or your spouse ever served in the U.S. Armed Forces (Active Duty, Reserve, or National Guard)? (Select all that apply)"
    type: multi_choice
    construct: have_spouse_ever_served_u
    required: true
    options:
      - id: "a"
        label: "No"
      - id: "b"
        label: "Yes, I served on active duty"
      - id: "c"
        label: "Yes, I served in the Reserve or National Guard"
      - id: "d"
        label: "Yes, my spouse served on active duty"
      - id: "e"
        label: "Yes, my spouse served in the Reserve or National Guard"
  - id: q18
    prompt: "Have you, or has anyone in your household experienced a loss of employment income in the last 4 weeks?"
    type: single_choice
    construct: have_has_anyone_household_experienced
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q19
    prompt: "In the last 7 days, did you do ANY work for either pay or profit?"
    type: single_choice
    construct: last_7_days_did_any
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q20
    prompt: "Are you employed by the government, by a private company, a nonprofit organization or are you self-employed or working in a family business?"
    type: single_choice
    construct: employed_by_government_by_private
    required: true
    options:
      - id: "a"
        label: "Government"
      - id: "b"
        label: "Private company"
      - id: "c"
        label: "Non-profit organization including tax exempt and charitable organizations"
      - id: "d"
        label: "Self-employed"
      - id: "e"
        label: "Working in a family business"
  - id: q21
    prompt: "What is your main reason for not working for pay or profit? I did not work because:"
    type: single_choice
    construct: main_reason_not_working_pay
    required: true
    options:
      - id: "a"
        label: "I did not want to be employed at this time"
      - id: "b"
        label: "I am/was caring for children not in school or daycare"
      - id: "c"
        label: "I am/was caring for an elderly person"
      - id: "d"
        label: "I am/was sick or disabled"
      - id: "e"
        label: "I am retired"
      - id: "f"
        label: "I am/was laid off or furloughed"
      - id: "g"
        label: "My employer closed temporarily or went out of business"
      - id: "h"
        label: "I do/did not have transportation to work"
      - id: "i"
        label: "Other reason"
  - id: q22
    prompt: "In the last 7 days, have any of the people in your household teleworked or worked from home?"
    type: single_choice
    construct: last_7_days_have_any
    required: true
    options:
      - id: "a"
        label: "Yes, for 1-2 days"
      - id: "b"
        label: "Yes, for 3-4 days"
      - id: "c"
        label: "Yes, for 5 or more days"
      - id: "d"
        label: "No"
  - id: q23
    prompt: "In the last 7 days, have you teleworked or worked from home?"
    type: single_choice
    construct: last_7_days_have_teleworked
    required: true
    options:
      - id: "a"
        label: "Yes, for 1-2 days"
      - id: "b"
        label: "Yes, for 3-4 days"
      - id: "c"
        label: "Yes, for 5 or more days"
      - id: "d"
        label: "No"
  - id: q24
    prompt: "Do you have difficulty seeing, even when wearing glasses?"
    type: single_choice
    construct: have_difficulty_seeing_even_when
    required: true
    options:
      - id: "a"
        label: "No - no difficulty"
      - id: "b"
        label: "Yes - some difficulty"
      - id: "c"
        label: "Yes - a lot of difficulty"
      - id: "d"
        label: "Cannot do at all"
  - id: q25
    prompt: "Do you have difficulty hearing, even when using a hearing aid?"
    type: single_choice
    construct: have_difficulty_hearing_even_when
    required: true
    options:
      - id: "a"
        label: "No - no difficulty"
      - id: "b"
        label: "Yes - some difficulty"
      - id: "c"
        label: "Yes - a lot of difficulty"
      - id: "d"
        label: "Cannot do at all"
  - id: q26
    prompt: "Do you have difficulty walking or climbing stairs?"
    type: single_choice
    construct: have_difficulty_walking_climbing_stairs
    required: true
    options:
      - id: "a"
        label: "No - no difficulty"
      - id: "b"
        label: "Yes - some difficulty"
      - id: "c"
        label: "Yes - a lot of difficulty"
      - id: "d"
        label: "Cannot do at all"
  - id: q27
    prompt: "Do you have difficulty remembering or concentrating?"
    type: single_choice
    construct: have_difficulty_remembering_concentratin
    required: true
    options:
      - id: "a"
        label: "No - no difficulty"
      - id: "b"
        label: "Yes - some difficulty"
      - id: "c"
        label: "Yes - a lot of difficulty"
      - id: "d"
        label: "Cannot do at all"
  - id: q28
    prompt: "Do you have difficulty with self-care, such as washing all over or dressing?"
    type: single_choice
    construct: have_difficulty_self_care_such
    required: true
    options:
      - id: "a"
        label: "No - no difficulty"
      - id: "b"
        label: "Yes - some difficulty"
      - id: "c"
        label: "Yes - a lot of difficulty"
      - id: "d"
        label: "Cannot do at all"
  - id: q29
    prompt: "Using your usual language, do you have difficulty communicating, for example understanding or being understood?"
    type: single_choice
    construct: using_usual_language_have_difficulty
    required: true
    options:
      - id: "a"
        label: "No - no difficulty"
      - id: "b"
        label: "Yes - some difficulty"
      - id: "c"
        label: "Yes - a lot of difficulty"
      - id: "d"
        label: "Cannot do at all"
  - id: q30
    prompt: "Over the last 2 weeks, how often have you been bothered by feeling nervous, anxious, or on edge?"
    type: single_choice
    construct: over_last_2_weeks_often
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Several days"
      - id: "c"
        label: "More than half the days"
      - id: "d"
        label: "Nearly every day"
  - id: q31
    prompt: "Over the last 2 weeks, how often have you been bothered by not being able to stop or control worrying?"
    type: single_choice
    construct: over_last_2_weeks_often
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Several days"
      - id: "c"
        label: "More than half the days"
      - id: "d"
        label: "Nearly every day"
  - id: q32
    prompt: "Over the last 2 weeks, how often have you been bothered by having little interest or pleasure in doing things?"
    type: single_choice
    construct: over_last_2_weeks_often
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Several days"
      - id: "c"
        label: "More than half the days"
      - id: "d"
        label: "Nearly every day"
  - id: q33
    prompt: "Over the last 2 weeks, how often have you been bothered by feeling down, depressed, or hopeless?"
    type: single_choice
    construct: over_last_2_weeks_often
    required: true
    options:
      - id: "a"
        label: "Not at all"
      - id: "b"
        label: "Several days"
      - id: "c"
        label: "More than half the days"
      - id: "d"
        label: "Nearly every day"
  - id: q34
    prompt: "During the last 4 weeks, did any children in your household need mental health treatment? Mental health treatment includes health services like counseling or medication."
    type: single_choice
    construct: during_last_4_weeks_did
    required: true
    options:
      - id: "a"
        label: "Yes, all children needed mental health treatment"
      - id: "b"
        label: "Yes, some but not all children needed mental health treatment"
      - id: "c"
        label: "No, none of the children needed mental health treatment"
  - id: q35
    prompt: "Did the children who needed mental health treatment receive it?"
    type: single_choice
    construct: did_children_who_needed_mental
    required: true
    options:
      - id: "a"
        label: "Yes, all children who needed treatment received it"
      - id: "b"
        label: "Yes, but only some children who needed treatment received it"
      - id: "c"
        label: "No, none of the children who needed treatment received it"
  - id: q36
    prompt: "Were you satisfied with the type, quality, and quantity of mental health treatment the children received?"
    type: single_choice
    construct: were_satisfied_type_quality_quantity
    required: true
    options:
      - id: "a"
        label: "Satisfied with all of the mental health treatment the children received"
      - id: "b"
        label: "Satisfied with some but not all of the mental health treatment the children received"
      - id: "c"
        label: "Not satisfied with the mental health treatment the children received"
  - id: q37
    prompt: "How difficult was it to get mental health treatment for the children?"
    type: single_choice
    construct: difficult_was_it_get_mental
    required: true
    options:
      - id: "a"
        label: "Not difficult"
      - id: "b"
        label: "Somewhat difficult"
      - id: "c"
        label: "Very difficult"
      - id: "d"
        label: "Unable to get treatment due to difficulty"
      - id: "e"
        label: "Did not try to get treatment"
  - id: q38
    prompt: "How often do you get the social and emotional support you need?"
    type: single_choice
    construct: often_get_social_emotional_support
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Usually"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q39
    prompt: "How often do you feel lonely?"
    type: single_choice
    construct: often_feel_lonely
    required: true
    options:
      - id: "a"
        label: "Always"
      - id: "b"
        label: "Usually"
      - id: "c"
        label: "Sometimes"
      - id: "d"
        label: "Rarely"
      - id: "e"
        label: "Never"
  - id: q40
    prompt: "In a typical week, how often do you talk on the telephone with family, friends, or neighbors?"
    type: single_choice
    construct: typical_week_often_talk_telephone
    required: true
    options:
      - id: "a"
        label: "Less than once a week"
      - id: "b"
        label: "1 or 2 times a week"
      - id: "c"
        label: "3 or 4 times a week"
      - id: "d"
        label: "5 or more times a week"
  - id: q41
    prompt: "How often do you get together with friends or relatives?"
    type: single_choice
    construct: often_get_together_friends_relatives
    required: true
    options:
      - id: "a"
        label: "Less than once a week"
      - id: "b"
        label: "1 or 2 times a week"
      - id: "c"
        label: "3 or 4 times a week"
      - id: "d"
        label: "5 or more times a week"
  - id: q42
    prompt: "How often do you attend church or religious services?"
    type: single_choice
    construct: often_attend_church_religious_services
    required: true
    options:
      - id: "a"
        label: "Never or less than once a year"
      - id: "b"
        label: "1 to 3 times per year"
      - id: "c"
        label: "4 to 11 times per year"
      - id: "d"
        label: "12 or more times per year"
  - id: q43
    prompt: "Altogether, how often do you attend meetings of clubs or organizations you belong to, such as church groups, unions, fraternal or athletic groups, or school groups?"
    type: single_choice
    construct: altogether_often_attend_meetings_clubs
    required: true
    options:
      - id: "a"
        label: "I do not belong to a group"
      - id: "b"
        label: "Never or less than once a year"
      - id: "c"
        label: "1 to 3 times per year"
      - id: "d"
        label: "4 to 11 times per year"
      - id: "e"
        label: "12 or more times per year"
  - id: q44
    prompt: "In a typical week, how often do you text or message with family, friends, or neighbors?"
    type: single_choice
    construct: typical_week_often_text_message
    required: true
    options:
      - id: "a"
        label: "Less than once a week"
      - id: "b"
        label: "1 or 2 times a week"
      - id: "c"
        label: "3 or 4 times a week"
      - id: "d"
        label: "5 or more times a week"
  - id: q45
