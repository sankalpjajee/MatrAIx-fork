schemaVersion: "1.0"
id: cps_food_security_v1
title: "CPS Food Security Supplement Survey"
description: "The December Food Security Supplement to the Current Population Survey is conducted by the U.S. Census Bureau for the U.S. Department of Agriculture's Economic Research Service (US"
questions:
  - id: q0
    prompt: "These first questions are about all the places at which you bought food LAST WEEK, meaning from Sunday through Saturday. First, did you or anyone in your household shop for food at a supermarket, grocery store, Walmart or Target LAST WEEK?"
    type: single_choice
    construct: these_first_questions_all_places
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q1
    prompt: "Think about other places where people buy food, such as dollar stores, pharmacies, club stores, farmers markets, or online. Did you or anyone in your household buy food from any stores such as these LAST WEEK?"
    type: single_choice
    construct: think_other_places_where_people
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q2
    prompt: "LAST WEEK, did you or anyone in your household buy food at a restaurant, fast food place, cafeteria, deli, convenience store, or vending machine? (Include any children who may have bought food at the school cafeteria.)"
    type: single_choice
    construct: last_week_did_anyone_household
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q3
    prompt: "Did you or anyone in your household buy food from any other kind of place LAST WEEK?"
    type: single_choice
    construct: did_anyone_household_buy_food
    required: true
    options:
      - id: "a"
        label: "Yes"
      - id: "b"
        label: "No"
  - id: q4
    prompt: "How much did you or anyone in your household spend in total at supermarkets, grocery stores, Walmart or Target LAST WEEK (including any purchases made with SNAP or food stamp benefits)? Enter a dollar amount."
    type: free_text
    construct: much_did_anyone_household_spend
    required: true
  - id: q5
    prompt: "How much of that supermarket/grocery spending was for non-food items, such as pet food, paper products, alcohol, detergents, or cleaning supplies? Enter a dollar amount."
    type: free_text
    construct: much_that_supermarket_grocery_spending
    required: true
  - id: q6
    prompt: "How much did you or your household spend at stores such as dollar stores, pharmacies, club stores, farmers markets, or online LAST WEEK (including any purchases made with SNAP or food stamp benefits)? Enter a dollar amount."
