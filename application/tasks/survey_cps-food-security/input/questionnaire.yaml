  - id: q10
    prompt: "Now think about how much you or anyone in your household USUALLY spends. How much do you or your household USUALLY spend on food at all the different places we've been talking about IN A WEEK (including any purchases made with SNAP or food stamp benefits, but not non-food items such as pet food, paper products, detergent or cleaning supplies)? Enter a dollar amount."
