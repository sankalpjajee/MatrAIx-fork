version = "1.0"
artifacts = ["/app/output"]

[task]
name = "application/openbb"

[metadata]
difficulty = "medium"
type = "chatbot"
domain = "finance-research"
tags = [
  "financial research",
  "openbb",
  "equity analysis",
  "multi turn chat",
]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
definition = "application/shared-chat-persona"
local_compose = "application/chatbot-api-sidecar_openbb"
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
