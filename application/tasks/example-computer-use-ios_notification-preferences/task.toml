schema_version = "1.1"
artifacts = [ "/tmp/personabench-ios-notification-preferences",]

[task]
name = "personabench/application-computer-use-ios-notification-preferences"

[metadata]
difficulty = "easy"
type = "mobile"
domain = "software"
tags = [ "notification permissions", "do not disturb", "app notifications", "system settings",]

[ios]
device_type = "iPhone-17"
runtime = "iOS-26-4"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1800.0

[environment]
definition = "application/example-computer-use-ios_notification-preferences"
cpus = 4
memory_mb = 4096
storage_mb = 40960
gpus = 0

[environment.healthcheck]
command = "mkdir -p /tmp/personabench-ios-notification-preferences"
timeout_sec = 30.0
retries = 3
