services:
  main:
    depends_on:
      ecommerce-web:
        condition: service_healthy

  ecommerce-web:
    build:
      context: ./ecommerce-web
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('localhost',8000),timeout=2); s.close()",
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
