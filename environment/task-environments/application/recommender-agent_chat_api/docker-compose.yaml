services:
  main:
    depends_on:
      rec-agent-api:
        condition: service_healthy

  rec-agent-api:
    build:
      context: ./recommender-api
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
