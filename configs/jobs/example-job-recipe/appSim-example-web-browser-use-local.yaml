# browser-use web task (Docker). Requires ANTHROPIC_API_KEY or LLM_API_KEY in your shell.
#
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-example-web-browser-use-local.yaml

job_name: appSim-example-web-browser-use-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-browser-use
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-sample/persona_0042.yaml

tasks:
  - path: application/tasks/example-web-browser-use_laptop-choice
