# Chat tasks (REST API + MCP sidecars). Requires ANTHROPIC_API_KEY in your shell.
#
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-example-chat-local.yaml

job_name: appSim-example-chat-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-claude-code
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-100/persona_0042.yaml

tasks:
  - path: application/tasks/example-chat-api_support_chatbot
  - path: application/tasks/example-chat-mcp_support_chatbot
