# macOS desktop computer-use task. Requires USE_COMPUTER_API_KEY + ANTHROPIC_API_KEY.
#
#   uv sync --extra use-computer --extra computer-1
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-example-computer-use-macos-local.yaml

job_name: appSim-example-computer-use-macos-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: use-computer
  delete: true

agents:
  - name: persona-computer-1
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-100/persona_0042.yaml

tasks:
  - path: application/tasks/example-computer-use-macos_notification-preferences
