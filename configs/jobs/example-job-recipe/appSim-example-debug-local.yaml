# Local persona reference job (Docker)

job_name: appSim-example-debug-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  force_build: true
  delete: true
  env:
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

agents:
  - name: persona-claude-code
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-100/persona_0042.yaml

tasks:
  - path: application/tasks/example-survey_product-feedback
  - path: application/tasks/example-chat-mcp_support_chatbot

