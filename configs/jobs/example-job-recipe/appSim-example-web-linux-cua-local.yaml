# Docker Linux web CUA (books.toscrape.com). ANTHROPIC_API_KEY only.
#
#   uv sync --extra computer-1
#   export ANTHROPIC_API_KEY=...
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-example-web-linux-cua-local.yaml

job_name: appSim-example-web-linux-cua-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-computer-1
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-sample/persona_0042.yaml
      cua_submission_profile: book_interest

tasks:
  - path: application/tasks/example-web-cua_bookshop-choice
