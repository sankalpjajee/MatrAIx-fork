# iOS mobile computer-use task. Requires USE_COMPUTER_API_KEY + ANTHROPIC_API_KEY.
#
#   uv sync --extra use-computer --extra computer-1
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-example-computer-use-ios-local.yaml

job_name: appSim-example-computer-use-ios-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: use-computer
  delete: true
  kwargs:
    platform: ios

agents:
  - name: persona-computer-1
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-100/persona_0042.yaml
      max_steps: 35
      recording_enabled: false

tasks:
  - path: application/tasks/example-computer-use-ios_notification-preferences
