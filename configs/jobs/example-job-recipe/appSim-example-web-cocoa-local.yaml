# CocoaAgent web task (single-container AIO Sandbox). Requires API key in your shell.
# On Apple Silicon, the sandbox base is amd64-only (Dockerfile pins linux/amd64).
#
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-example-web-cocoa-local.yaml

job_name: appSim-example-web-cocoa-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.5
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-cocoa
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-sample/persona_0042.yaml

tasks:
  - path: application/tasks/example-web-cocoa_plan-choice
