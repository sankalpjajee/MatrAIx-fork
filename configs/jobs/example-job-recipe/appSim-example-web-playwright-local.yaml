# Playwright web task (Docker). Requires LLM_API_KEY (or ANTHROPIC_API_KEY mapped to it).
#
#   export LLM_API_KEY="${ANTHROPIC_API_KEY}"
#   uv run harbor run -c configs/jobs/example-job-recipe/appSim-example-web-playwright-local.yaml

job_name: appSim-example-web-playwright-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-openhands-sdk
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/datasets/bench-dev-sample/persona_0042.yaml

tasks:
  - path: application/tasks/example-web-playwright_quote-choice
