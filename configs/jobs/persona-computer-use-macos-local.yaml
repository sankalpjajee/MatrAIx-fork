# macOS desktop computer-use task. Requires USE_COMPUTER_API_KEY + ANTHROPIC_API_KEY.
#
#   uv sync --extra use-computer --extra computer-1
#   uv run harbor run -c configs/jobs/persona-computer-use-macos-local.yaml

job_name: persona-computer-use-macos-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: use-computer
  delete: true

agents:
  - name: persona-computer-1
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/examples/persona_0042.yaml

tasks:
  - path: tasks/computer-use/macos-notification-preferences
