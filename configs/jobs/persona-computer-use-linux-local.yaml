# Docker Linux desktop computer-use (notifications). ANTHROPIC_API_KEY only.
#
#   uv sync --extra computer-1
#   uv run harbor run -c configs/jobs/persona-computer-use-linux-local.yaml

job_name: persona-computer-use-linux-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-computer-1
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/examples/persona_0042.yaml

tasks:
  - path: tasks/computer-use/linux-notification-preferences
