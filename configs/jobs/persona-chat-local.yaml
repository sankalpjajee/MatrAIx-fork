# Chat tasks (REST API + MCP sidecars). Requires ANTHROPIC_API_KEY in your shell.
#
#   uv run harbor run -c configs/jobs/persona-chat-local.yaml

job_name: persona-chat-local
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 1
quiet: false

environment:
  type: docker
  delete: true

agents:
  - name: persona-claude-code
    model_name: anthropic/claude-sonnet-4-6
    kwargs:
      persona_path: persona/examples/persona_0042.yaml

tasks:
  - path: tasks/chat/acme-support-api
  - path: tasks/chat/acme-support-mcp
