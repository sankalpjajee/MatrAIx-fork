version = "1.0"

artifacts = ["/app/output"]

[task]
name = "matraix/books-interest-cocoa"
keywords = ["matraix", "web", "cocoa", "live-site"]

[metadata]
difficulty = "medium"
category = "web"
tags = ["matraix", "persona", "cocoa", "aio-sandbox", "live-web"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1200.0
network_mode = "public"

[environment]
build_timeout_sec = 1800.0
cpus = 2
memory_mb = 4096
storage_mb = 20480
gpus = 0
network_mode = "public"

[environment.healthcheck]
command = "curl -sf http://127.0.0.1:8080/v1/ping"
interval_sec = 10.0
timeout_sec = 15.0
start_period_sec = 180.0
start_interval_sec = 5.0
retries = 6
