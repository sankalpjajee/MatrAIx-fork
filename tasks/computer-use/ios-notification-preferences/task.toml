schema_version = "1.1"

artifacts = ["/tmp/matraix-ios-notification-preferences"]

[task]
name = "matraix/ios-notification-preferences"
keywords = ["matraix", "computer-use", "mobile", "ios"]

[metadata]
difficulty = "easy"
category = "mobile"
tags = ["matraix", "persona", "use-computer", "ios", "notifications"]

[ios]
device_type = "iPhone-17"
runtime = "iOS-26-4"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1800.0

[environment]
cpus = 4
memory_mb = 4096
storage_mb = 40960
gpus = 0

[environment.healthcheck]
command = "mkdir -p /tmp/matraix-ios-notification-preferences"
timeout_sec = 30.0
retries = 3
